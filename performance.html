<div style="padding-top:28px"></div><h1>📈 Performance Review</h1>
<p class="subtitle">Analysiere deine letzten League of Legends Games</p>

<div class="container">

  <!-- Search Bar -->
  <div class="search-bar">
    <div class="search-field" style="flex:2">
      <label>Riot ID</label>
      <input type="text" id="riotIdInput" placeholder="YourName#EUW">
      <div class="riot-id-hint" id="riotHint">Einloggen um deine hinterlegte Riot ID zu laden → <a href="profile.html">Profil</a></div>
    </div>
    <div class="search-field" style="flex:1">
      <label>Region</label>
      <select id="regionSelect">
        <option value="EUW1">EUW</option>
        <option value="EUN1">EUNE</option>
        <option value="NA1">NA</option>
        <option value="KR">KR</option>
        <option value="BR1">BR</option>
        <option value="LA1">LAN</option>
        <option value="LA2">LAS</option>
        <option value="OC1">OCE</option>
        <option value="TR1">TR</option>

        <option value="JP1">JP</option>
      </select>
    </div>
    <div class="search-field" style="flex:1">
      <label>Anzahl Games</label>
      <select id="countSelect">
        <option value="10">Letzte 10</option>

      </select>
    </div>
    <div class="search-field" style="flex:1">
      <label>Spielmodus</label>
      <select id="queueSelect">
        <option value="">Alle Modi</option>
        <option value="420">Ranked Solo</option>
        <option value="440">Ranked Flex</option>
        <option value="400">Normal Draft</option>
        <option value="450">ARAM</option>
      </select>
    </div>
    <button class="btn primary" id="analyzeBtn">🔍 Analysieren</button>
  </div>

  <!-- Results -->
  <div id="resultsContainer">
    <div class="loading-state" style="display:none" id="loadingState">
      <div class="spinner">⚙️</div>
      <div id="loadingText">Lade Match-Daten…</div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://pwqnwxxxrynlklxrbuco.supabase.co';
const SUPABASE_KEY = 'sb_publishable_OqIsltFoT9bYBcZ-Ik_uRg_Lr9xmpAh';
const RIOT_KEY    = 'RGAPI-54cc1652-51e9-4fca-8126-2dc6d600c0b0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const VERSION = '16.6.1';
const IMG_CHAMP = `https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/champion/`;

// Region → routing cluster
const ROUTING = {
  EUW1: 'europe', EUN1: 'europe', TR1: 'europe', RU: 'europe',
  NA1: 'americas', BR1: 'americas', LA1: 'americas', LA2: 'americas',
  KR: 'asia', JP1: 'asia', OC1: 'sea',
};

// Load logged-in user's riot id
async function loadUserProfile() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session?.user) return;
  const { data: profile } = await sb.from('profiles').select('riot_id, riot_region').eq('id', session.user.id).single();
  if (profile?.riot_id) {
    document.getElementById('riotIdInput').value = profile.riot_id;
    document.getElementById('regionSelect').value = profile.riot_region || 'EUW1';
    document.getElementById('riotHint').innerHTML = `✅ Riot ID aus deinem <a href="profile.html">Profil</a> geladen`;
  }
}

async function riotFetch(url) {
  const res = await fetch(url, { headers: { 'X-Riot-Token': RIOT_KEY } });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.status?.message || `HTTP ${res.status}`);
  }
  return res.json();
}

function setLoading(text) {
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('loadingText').textContent = text;
}

function timeAgo(ts) {
  const sec = Math.floor((Date.now() - ts * 1000) / 1000);
  if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
  if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
  return `${Math.floor(sec/86400)}d ago`;
}

function formatDuration(sec) {
  return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
}

function kdaRatio(k, d, a) {
  if (d === 0) return 'Perfect';
  return ((k + a) / d).toFixed(2);
}

function generateInsights(games, puuid) {
  const insights = [];
  const myGames = games.map(g => g.info.participants.find(p => p.puuid === puuid)).filter(Boolean);
  if (!myGames.length) return insights;

  const wins = myGames.filter(p => p.win).length;
  const wr = (wins / myGames.length * 100).toFixed(0);
  const avgKills   = (myGames.reduce((s,p) => s+p.kills, 0) / myGames.length).toFixed(1);
  const avgDeaths  = (myGames.reduce((s,p) => s+p.deaths, 0) / myGames.length).toFixed(1);
  const avgAssists = (myGames.reduce((s,p) => s+p.assists, 0) / myGames.length).toFixed(1);
  const avgCS      = (myGames.reduce((s,p) => s+p.totalMinionsKilled+p.neutralMinionsKilled, 0) / myGames.length).toFixed(0);
  const avgVision  = (myGames.reduce((s,p) => s+p.visionScore, 0) / myGames.length).toFixed(1);
  const avgDmg     = (myGames.reduce((s,p) => s+p.totalDamageDealtToChampions, 0) / myGames.length).toFixed(0);
  const avgDuration = games.reduce((s,g) => s+g.info.gameDuration, 0) / games.length;
  const avgCSmin   = (avgCS / (avgDuration / 60)).toFixed(1);

  // Winrate
  if (parseInt(wr) >= 60) insights.push({ type: 'good', icon: '🏆', text: `Starke Winrate von ${wr}% — du gewinnst mehr als du verlierst.` });
  else if (parseInt(wr) >= 50) insights.push({ type: 'info', icon: '📊', text: `Winrate von ${wr}% — leicht positiv. Konsistenz weiter ausbauen.` });
  else if (parseInt(wr) >= 40) insights.push({ type: 'warn', icon: '⚠️', text: `Winrate von ${wr}% — unter 50%. Fokus auf weniger Champion-Pool kann helfen.` });
  else insights.push({ type: 'bad', icon: '🔴', text: `Winrate von ${wr}% — kritisch niedrig. Analysiere deine Fehler in verlorenen Games.` });

  // Deaths
  if (parseFloat(avgDeaths) <= 3) insights.push({ type: 'good', icon: '🛡️', text: `Nur ${avgDeaths} Deaths im Schnitt — sehr gutes Spielverständnis und Positionierung.` });
  else if (parseFloat(avgDeaths) >= 7) insights.push({ type: 'bad', icon: '💀', text: `${avgDeaths} Deaths im Schnitt ist sehr hoch. Überprüfe deine Positionierung in Team-Fights.` });
  else if (parseFloat(avgDeaths) >= 5) insights.push({ type: 'warn', icon: '⚠️', text: `${avgDeaths} Deaths im Schnitt — etwas hoch. Weniger riskante Spielzüge können helfen.` });

  // CS per minute
  if (parseFloat(avgCSmin) >= 8) insights.push({ type: 'good', icon: '⚔️', text: `${avgCSmin} CS/min — exzellentes Laning. Du lässt kaum Goldwert auf der Map liegen.` });
  else if (parseFloat(avgCSmin) >= 6) insights.push({ type: 'info', icon: '⚔️', text: `${avgCSmin} CS/min — solide. Ziel: 8+ CS/min für maximalen Goldvorteil.` });
  else insights.push({ type: 'warn', icon: '⚔️', text: `${avgCSmin} CS/min — deutlich unter Durchschnitt. CS-Training könnte einen großen Einfluss haben.` });

  // Vision
  if (parseFloat(avgVision) >= 30) insights.push({ type: 'good', icon: '👁️', text: `${avgVision} Vision Score im Schnitt — du kontrollierst die Map gut.` });
  else if (parseFloat(avgVision) <= 15) insights.push({ type: 'bad', icon: '👁️', text: `${avgVision} Vision Score — sehr niedrig. Mehr Wards setzen und feindliche Wards clearen.` });

  // KDA
  const kda = kdaRatio(parseFloat(avgKills), parseFloat(avgDeaths), parseFloat(avgAssists));
  if (kda !== 'Perfect' && parseFloat(kda) >= 4) insights.push({ type: 'good', icon: '✨', text: `KDA von ${kda} — sehr stark. Du bist oft im Vorteil in direkten Kämpfen.` });
  else if (kda !== 'Perfect' && parseFloat(kda) <= 1.5) insights.push({ type: 'warn', icon: '⚔️', text: `KDA von ${kda} — unter Durchschnitt. Fokus auf sicherere Spielweise.` });

  return insights;
}

async function analyze() {
  const riotInput = document.getElementById('riotIdInput').value.trim();
  const region    = document.getElementById('regionSelect').value;
  const count     = parseInt(document.getElementById('countSelect').value);
  const queue     = document.getElementById('queueSelect').value;

  if (!riotInput.includes('#')) {
    alert('Bitte Riot ID im Format Name#Tag eingeben (z.B. Joshua#EUW)');
    return;
  }

  const [gameName, tagLine] = riotInput.split('#');
  const routing = ROUTING[region] || 'europe';
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Lädt…';

  const results = document.getElementById('resultsContainer');
  results.innerHTML = '';
  setLoading('Suche Spieler…');

  try {
    // 1. Get PUUID
    const account = await riotFetch(`https://${routing}.api.riotgames.com/riot/account/v1/accounts/by-riot-id/${encodeURIComponent(gameName)}/${encodeURIComponent(tagLine)}`);
    const puuid = account.puuid;

    setLoading(`Lade letzte ${count} Matches…`);

    // 2. Get match IDs
    let matchUrl = `https://${routing}.api.riotgames.com/lol/match/v5/matches/by-puuid/${puuid}/ids?start=0&count=${count}`;
    if (queue) matchUrl += `&queue=${queue}`;
    const matchIds = await riotFetch(matchUrl);

    if (!matchIds.length) {
      results.innerHTML = `<div class="error-state"><div class="err-icon">🎮</div><div>Keine Matches gefunden für diesen Spieler / Spielmodus.</div></div>`;
      return;
    }

    // 3. Fetch match details (parallel, max 5 at a time)
    const games = [];
    for (let i = 0; i < matchIds.length; i += 5) {
      setLoading(`Lade Match-Details… (${Math.min(i+5, matchIds.length)}/${matchIds.length})`);
      const batch = matchIds.slice(i, i+5).map(id =>
        riotFetch(`https://${routing}.api.riotgames.com/lol/match/v5/matches/${id}`).catch(() => null)
      );
      const res = await Promise.all(batch);
      games.push(...res.filter(Boolean));
    }

    document.getElementById('loadingState').style.display = 'none';
    renderResults(games, puuid, account);

  } catch (err) {
    results.innerHTML = `<div class="error-state"><div class="err-icon">❌</div><div>${err.message}</div></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 Analysieren';
  }
}

function renderResults(games, puuid, account) {
  const myGames = games.map(g => ({ match: g, me: g.info.participants.find(p => p.puuid === puuid) })).filter(x => x.me);
  if (!myGames.length) return;

  // Aggregate stats
  const wins    = myGames.filter(x => x.me.win).length;
  const losses  = myGames.length - wins;
  const wr      = (wins / myGames.length * 100).toFixed(0);
  const avgK    = (myGames.reduce((s,x) => s+x.me.kills, 0) / myGames.length).toFixed(1);
  const avgD    = (myGames.reduce((s,x) => s+x.me.deaths, 0) / myGames.length).toFixed(1);
  const avgA    = (myGames.reduce((s,x) => s+x.me.assists, 0) / myGames.length).toFixed(1);
  const totalCS = myGames.reduce((s,x) => s+x.me.totalMinionsKilled+x.me.neutralMinionsKilled, 0);
  const avgCS   = (totalCS / myGames.length).toFixed(0);
  const avgDur  = myGames.reduce((s,x) => s+x.match.info.gameDuration, 0) / myGames.length;
  const avgCSmin = (totalCS / myGames.length / (avgDur/60)).toFixed(1);
  const avgVision = (myGames.reduce((s,x) => s+x.me.visionScore, 0) / myGames.length).toFixed(1);
  const avgDmg  = (myGames.reduce((s,x) => s+x.me.totalDamageDealtToChampions, 0) / myGames.length).toFixed(0);
  const kda     = kdaRatio(parseFloat(avgK), parseFloat(avgD), parseFloat(avgA));

  // Champion stats
  const champMap = {};
  myGames.forEach(({ me }) => {
    if (!champMap[me.championName]) champMap[me.championName] = { games: 0, wins: 0, kills: 0, deaths: 0, assists: 0 };
    champMap[me.championName].games++;
    if (me.win) champMap[me.championName].wins++;
    champMap[me.championName].kills   += me.kills;
    champMap[me.championName].deaths  += me.deaths;
    champMap[me.championName].assists += me.assists;
  });
  const topChamps = Object.entries(champMap).sort((a,b) => b[1].games - a[1].games).slice(0, 6);

  // Insights
  const insights = generateInsights(games, puuid);

  const wrColor = parseInt(wr) >= 55 ? '#4caf50' : parseInt(wr) >= 45 ? '#c89b3c' : '#f44336';

  document.getElementById('resultsContainer').innerHTML = `
    <!-- Player header -->
    <div style="background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px">
      <div style="font-size:1.4rem">🎮</div>
      <div>
        <div style="font-size:1.1rem;font-weight:700;color:#e8c97e">${account.gameName}<span style="color:#5b5b5b">#${account.tagLine}</span></div>
        <div style="font-size:0.75rem;color:#5b5b5b;margin-top:2px">${myGames.length} analysierte Games · Ø ${formatDuration(Math.round(avgDur))} Spieldauer</div>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="summary-grid">
      <div class="stat-card highlight">
        <div class="sc-label">Winrate</div>
        <div class="sc-val" style="color:${wrColor}">${wr}%</div>
        <div class="sc-sub">${wins}W / ${losses}L</div>
      </div>
      <div class="stat-card">
        <div class="sc-label">Avg KDA</div>
        <div class="sc-val">${avgK}/${avgD}/${avgA}</div>
        <div class="sc-sub">Ratio: ${kda}</div>
      </div>
      <div class="stat-card">
        <div class="sc-label">CS / min</div>
        <div class="sc-val">${avgCSmin}</div>
        <div class="sc-sub">Ø ${avgCS} CS</div>
      </div>
      <div class="stat-card">
        <div class="sc-label">Vision Score</div>
        <div class="sc-val">${avgVision}</div>
        <div class="sc-sub">pro Game</div>
      </div>
      <div class="stat-card">
        <div class="sc-label">Avg Damage</div>
        <div class="sc-val" style="font-size:1.1rem">${parseInt(avgDmg).toLocaleString()}</div>
        <div class="sc-sub">vs Champions</div>
      </div>
    </div>

    <!-- Insights -->
    ${insights.length ? `
    <div class="insights-panel">
      <div class="insights-title">💡 Automatische Insights</div>
      <div class="insight-list">
        ${insights.map(i => `<div class="insight ${i.type}"><span class="i-icon">${i.icon}</span><span>${i.text}</span></div>`).join('')}
      </div>
    </div>` : ''}

    <!-- Top Champions -->
    <div class="section-title">🏆 Meistgespielte Champions</div>
    <div class="champ-grid" style="margin-bottom:24px">
      ${topChamps.map(([name, s]) => {
        const wr = (s.wins/s.games*100).toFixed(0);
        const wrClass = parseInt(wr) >= 55 ? 'wr-high' : parseInt(wr) >= 45 ? 'wr-mid' : 'wr-low';
        const kda = kdaRatio(s.kills/s.games, s.deaths/s.games, s.assists/s.games);
        return `<div class="champ-card">
          <img src="${IMG_CHAMP}${name}.png" alt="${name}" onerror="this.src='https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/champion/Ryze.png'">
          <div>
            <div class="cc-name">${name}</div>
            <div class="cc-stats">${s.games} Games · KDA ${kda}</div>
          </div>
          <div class="cc-wr ${wrClass}">${wr}%</div>
        </div>`;
      }).join('')}
    </div>

    <!-- Match History -->
    <div class="section-title">📋 Match History</div>
    <div class="match-list">
      ${myGames.map(({ match, me }) => {
        const dur = formatDuration(match.info.gameDuration);
        const cs  = me.totalMinionsKilled + me.neutralMinionsKilled;
        const csm = (cs / (match.info.gameDuration/60)).toFixed(1);
        const kda = kdaRatio(me.kills, me.deaths, me.assists);
        const ago = timeAgo(match.info.gameCreation / 1000);
        const mode = match.info.gameMode === 'CLASSIC' ? (match.info.queueId === 420 ? 'Ranked Solo' : match.info.queueId === 440 ? 'Ranked Flex' : 'Normal') : match.info.gameMode;
        return `<div class="match-row ${me.win ? 'win-row' : 'loss-row'}">
          <div></div>
          <img src="${IMG_CHAMP}${me.championName}.png" alt="${me.championName}" onerror="this.style.display='none'">
          <div>
            <div class="mr-champ">${me.championName}</div>
            <div class="mr-pos">${me.teamPosition || me.lane || ''} · ${mode}</div>
          </div>
          <div>
            <div class="mr-kda ${me.win ? 'win-kda' : 'loss-kda'}">${me.kills}/${me.deaths}/${me.assists}</div>
            <div class="mr-kda-ratio">KDA ${kda}</div>
          </div>
          <div class="mr-stat">
            <div class="s-val">${csm}</div>
            <div class="s-lbl">CS/min</div>
          </div>
          <div class="mr-stat">
            <div class="s-val">${me.visionScore}</div>
            <div class="s-lbl">Vision</div>
          </div>
          <div class="mr-stat">
            <div class="s-val">${(me.totalDamageDealtToChampions/1000).toFixed(1)}k</div>
            <div class="s-lbl">Damage</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <span class="mr-badge ${me.win ? 'badge-win' : 'badge-loss'}">${me.win ? 'WIN' : 'LOSS'}</span>
            <span class="mr-time">${dur} · ${ago}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

document.getElementById('analyzeBtn').onclick = analyze;
document.getElementById('riotIdInput').addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });

loadUserProfile();
</script>
</body>
</html>
