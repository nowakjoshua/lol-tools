<body>

<h1>🧮 Build Planner</h1>
<p class="subtitle">League of Legends · Patch 16.6.1</p>



<!-- ── Item Picker Modal ── -->
<div class="item-modal-overlay" id="itemModalOverlay">
  <div class="item-modal">
    <div class="panel-title">Select an Item</div>
    <input type="text" id="modalSearch" placeholder="Search items..." autocomplete="off">

  </div>
</div>

<div class="workspace">
  <!-- LEFT -->
  <div style="display:flex;flex-direction:column;gap:16px">
    <div class="panel">
      <div class="panel-title">Champion</div>
      <div class="search-wrap">
        <input type="text" id="champSearch" placeholder="Search champion..." autocomplete="off">
        <div class="dropdown" id="champDrop"></div>
      </div>
      <div class="champ-card" id="champCard">
        <img id="champImg" src="" alt="">
        <div>
          <div class="champ-name" id="champName"></div>
          <div class="champ-title" id="champTitle"></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Build Name</div>
      <input type="text" id="buildName" placeholder="e.g. Full Crit ADC" autocomplete="off">
    </div>

    <div class="panel">
      <div class="panel-title">Items (6 Slots)</div>
      <div class="item-slots" id="itemSlots"></div>
    </div>

    <div class="build-actions">
      <button class="btn primary" id="saveBtn">💾 Save Build</button>
      <button class="btn" id="resetBtn">↺ Reset</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-col">
    <div class="panel">
      <div class="panel-title">Build Tags</div>
      <div class="tags-wrap" id="tagsWrap">
        <span class="tag-empty">Add items to generate tags…</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Total Stats</div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-row" style="grid-column:1/-1">
          <span class="s-name" style="font-style:italic;color:#3a3a4a">No items selected</span>
        </div>
      </div>
      <div class="gold-total" id="goldTotal" style="display:none">
        <span>🪙 Total Gold Cost</span>
        <span id="goldVal">0</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>Saved Builds</span>
        <span id="syncStatus" class="sync-notice"></span>
      </div>
      <div class="saved-list" id="savedList"></div>
    </div>
  </div>
</div>

<script>
// Use shared Supabase client from navbar.js
const sb = window._sb || supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);

const VERSION = '16.6.1';
const IMG_ITEM  = `https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/item/`;
const IMG_CHAMP = `https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/champion/`;

let allItems = {}, allChampions = {};
let buildSlots = [null,null,null,null,null,null];
let activeSlotIdx = null;
let selectedChamp = null;
let currentUser = null;

// ── Supabase Auth — uses shared _sb from navbar.js ──
sb.auth.onAuthStateChange(async (event, session) => {
  currentUser = session?.user || null;
  await renderSavedBuilds();
});

// ── Tags ──
const TAG_RULES = [
  { tag: '⚔️ High AD',       check: s => (s['Attack Damage']||0) >= 60 },
  { tag: '🔮 High AP',        check: s => (s['Ability Power']||0) >= 80 },
  { tag: '🎯 Crit Build',     check: s => (s['Critical Strike Chance']||0) >= 40 },
  { tag: '🗡️ Lethality',      check: s => (s['Lethality']||0) >= 18 },
  { tag: '🛡️ Tank',           check: s => (s['Health']||0) >= 400 || (s['Armor']||0) >= 60 || (s['Magic Resist']||0) >= 60 },
  { tag: '❤️ Sustain',        check: s => (s['Life Steal']||0) >= 10 || (s['Omnivamp']||0) >= 8 },
  { tag: '⚡ Attack Speed',   check: s => (s['Attack Speed']||0) >= 40 },
  { tag: '🌀 Ability Haste',  check: s => (s['Ability Haste']||0) >= 30 },
  { tag: '💜 Magic Pen',      check: s => (s['Magic Penetration']||0) >= 20 },
  { tag: '🩸 Armor Pen',      check: s => (s['Armor Penetration']||0) >= 15 },
  { tag: '💎 Mana Heavy',     check: s => (s['Mana']||0) >= 400 },
  { tag: '🏃 Mobility',       check: s => (s['Move Speed']||0) >= 10 },
  { tag: '🔋 Health Pool',    check: s => (s['Health']||0) >= 800 },
  { tag: '🧊 Utility',        check: s => (s['Ability Haste']||0) >= 15 && (s['Mana']||0) >= 200 },
  { tag: '💥 Burst',          check: s => (s['Ability Power']||0) >= 60 && (s['Ability Haste']||0) < 20 },
];

function generateTags(stats) {
  const tags = TAG_RULES.filter(r => r.check(stats)).map(r => r.tag);
  if (tags.length < 5) {
    const sorted = Object.entries(stats).sort((a,b) => b[1]-a[1]);
    for (const [name] of sorted) {
      if (tags.length >= 5) break;
      if (!tags.some(t => t.includes(name))) tags.push(`📌 ${name}`);
    }
  }
  return tags.slice(0, 5);
}

function parseDescriptionStats(description) {
  const stats = {};
  const match = description.match(/<stats>([\s\S]*?)<\/stats>/);
  if (!match) return stats;
  const regex = /<attention>([^<]+)<\/attention>\s*([^<\n\r]+)/g;
  let m;
  while ((m = regex.exec(match[1])) !== null) {
    const rawVal = m[1].trim().replace('%','');
    const name = m[2].trim().replace(/<[^>]+>/g,'').trim();
    const val = parseFloat(rawVal);
    if (!isNaN(val) && name) stats[name] = (stats[name]||0) + val;
  }
  return stats;
}

function formatStat(name, val) {
  const pct = ['Critical Strike Chance','Critical Strike Damage','Attack Speed','Life Steal','Omnivamp','Heal and Shield Power','Tenacity','Armor Penetration','Magic Penetration'].includes(name);
  if (pct) return val + '%';
  return val % 1 === 0 ? val : parseFloat(val.toFixed(1));
}

// ── Data ──
async function loadData() {
  const [itemRes, champRes] = await Promise.all([
    fetch(`https://ddragon.leagueoflegends.com/cdn/${VERSION}/data/en_US/item.json`),
    fetch(`https://ddragon.leagueoflegends.com/cdn/${VERSION}/data/en_US/champion.json`),
  ]);
  const itemData = await itemRes.json();
  const champData = await champRes.json();
  const seen = {};
  for (const [id, item] of Object.entries(itemData.data)) {
    if (!item.gold?.purchasable) continue;
    if (!item.maps?.['11'] && !item.maps?.['12']) continue;
    if (!seen[item.name]) { allItems[id] = item; seen[item.name] = id; }
  }
  allChampions = champData.data;
}

// ── Slots ──
function renderSlots() {
  const container = document.getElementById('itemSlots');
  container.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const slot = document.createElement('div');
    slot.className = 'item-slot' + (buildSlots[i] ? ' filled' : '');
    if (buildSlots[i]) {
      const item = buildSlots[i];
      slot.innerHTML = `
        <img src="${IMG_ITEM}${item.image.full}" alt="${item.name}">
        <div class="slot-name">${item.name}</div>
        <button class="remove-btn" data-idx="${i}">✕</button>
      `;
    } else {
      slot.innerHTML = `<span class="slot-plus">+</span>`;
    }
    slot.addEventListener('click', e => { if (!e.target.classList.contains('remove-btn')) openItemModal(i); });
    container.appendChild(slot);
  }
  container.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      buildSlots[parseInt(btn.dataset.idx)] = null;
      renderSlots(); updateStats();
    });
  });
}

// ── Item Modal ──
function openItemModal(idx) {
  activeSlotIdx = idx;
  document.getElementById('modalSearch').value = '';
  renderModalItems('');
  document.getElementById('itemModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('modalSearch').focus(), 50);
}

function closeItemModal() {
  document.getElementById('itemModalOverlay').classList.remove('open');
  activeSlotIdx = null;
}

function renderModalItems(query) {
  const q = query.toLowerCase().trim();
  const results = Object.entries(allItems)
    .filter(([,item]) => !q || item.name.toLowerCase().includes(q))
    .slice(0, 60);
  const container = document.getElementById('modalResults');
  container.innerHTML = '';
  for (const [id, item] of results) {
    const div = document.createElement('div');
    div.className = 'modal-item';
    div.innerHTML = `<img src="${IMG_ITEM}${item.image.full}" alt="${item.name}"><span>${item.name}</span>`;
    div.addEventListener('click', () => {
      buildSlots[activeSlotIdx] = item;
      closeItemModal(); renderSlots(); updateStats();
    });
    container.appendChild(div);
  }
}

document.getElementById('modalSearch').addEventListener('input', e => renderModalItems(e.target.value));
document.getElementById('modalClose').addEventListener('click', closeItemModal);
document.getElementById('itemModalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('itemModalOverlay')) closeItemModal();
});

// ── Stats ──
function updateStats() {
  const combined = {};
  let totalGold = 0;
  const itemCount = buildSlots.filter(Boolean).length;
  for (const item of buildSlots) {
    if (!item) continue;
    totalGold += item.gold?.total || 0;
    const s = parseDescriptionStats(item.description || '');
    for (const [k, v] of Object.entries(s)) combined[k] = (combined[k]||0) + v;
  }
  const grid = document.getElementById('statsGrid');
  if (!itemCount) {
    grid.innerHTML = `<div class="stat-row" style="grid-column:1/-1"><span class="s-name" style="font-style:italic;color:#3a3a4a">No items selected</span></div>`;
    document.getElementById('goldTotal').style.display = 'none';
  } else {
    grid.innerHTML = Object.entries(combined).sort((a,b)=>b[1]-a[1])
      .map(([k,v]) => `<div class="stat-row"><span class="s-name">${k}</span><span class="s-val">${formatStat(k,v)}</span></div>`)
      .join('');
    document.getElementById('goldTotal').style.display = 'flex';
    document.getElementById('goldVal').textContent = totalGold.toLocaleString() + ' g';
  }
  const tagsWrap = document.getElementById('tagsWrap');
  if (!itemCount) {
    tagsWrap.innerHTML = '<span class="tag-empty">Add items to generate tags…</span>';
  } else {
    tagsWrap.innerHTML = generateTags(combined).map(t => `<span class="tag">${t}</span>`).join('');
  }
}

// ── Champion search ──
function setupChampSearch() {
  const input = document.getElementById('champSearch');
  const drop  = document.getElementById('champDrop');
  input.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    drop.innerHTML = '';
    if (!q) { drop.classList.remove('open'); return; }
    const results = Object.entries(allChampions).filter(([,c]) => c.name.toLowerCase().includes(q)).slice(0,10);
    if (!results.length) { drop.classList.remove('open'); return; }
    for (const [key, champ] of results) {
      const div = document.createElement('div');
      div.className = 'dd-item';
      div.innerHTML = `<img src="${IMG_CHAMP}${champ.image.full}" alt=""><span>${champ.name}</span>`;
      div.addEventListener('click', () => {
        selectedChamp = { key, champ };
        document.getElementById('champImg').src = IMG_CHAMP + champ.image.full;
        document.getElementById('champName').textContent = champ.name;
        document.getElementById('champTitle').textContent = champ.title;
        document.getElementById('champCard').classList.add('visible');
        input.value = champ.name;
        drop.classList.remove('open');
      });
      drop.appendChild(div);
    }
    drop.classList.add('open');
  });
  document.addEventListener('click', e => {
    if (!input.contains(e.target) && !drop.contains(e.target)) drop.classList.remove('open');
  });
}

// ── Save / Load ──
async function renderSavedBuilds() {
  const list = document.getElementById('savedList');
  const sync = document.getElementById('syncStatus');
  let builds = [];

  if (currentUser) {
    sync.innerHTML = '<span>☁️ Cloud Sync aktiv</span>';
    const { data, error } = await sb.from('builds').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
    if (!error) builds = data;
  } else {
    sync.innerHTML = 'Lokal · <a href="#" style="color:#c89b3c;text-decoration:none" id="loginToSync">Login für Cloud-Sync</a>';
    document.getElementById('loginToSync')?.addEventListener('click', e => { e.preventDefault(); openAuthModal('login'); });
    try { builds = JSON.parse(localStorage.getItem('lol_builds') || '[]'); } catch { builds = []; }
  }

  if (!builds.length) {
    list.innerHTML = '<div class="no-builds">No saved builds yet.</div>';
    return;
  }

  list.innerHTML = '';
  builds.forEach((b, i) => {
    const div = document.createElement('div');
    div.className = 'saved-build';
    const itemIds = b.item_ids || b.itemIds || [];
    const tags = b.tags || [];
    const gold = b.gold || 0;
    const champImg = b.champ_img || b.champImg || '';
    const champName = b.champ_name || b.champName || 'No champion';
    const buildId = b.id || i;

    div.innerHTML = `
      ${champImg ? `<img src="${champImg}" alt="">` : '<div style="width:36px;height:36px;background:#1a1a24;border-radius:5px"></div>'}
      <div style="flex:1;min-width:0">
        <div class="sb-name">${b.name || 'Unnamed Build'}</div>
        <div class="sb-meta">${champName} · ${itemIds.filter(Boolean).length} items · 🪙 ${gold.toLocaleString()}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">
          ${tags.map(t=>`<span style="font-size:0.65rem;background:#1a1a08;border:1px solid #c89b3c33;border-radius:10px;padding:1px 7px;color:#c89b3c">${t}</span>`).join('')}
        </div>
      </div>
      <button class="sb-del" title="Delete">🗑</button>
    `;

    div.querySelector('.sb-del').addEventListener('click', async e => {
      e.stopPropagation();
      if (currentUser && b.id) {
        await sb.from('builds').delete().eq('id', b.id);
      } else {
        const local = JSON.parse(localStorage.getItem('lol_builds')||'[]');
        local.splice(i, 1);
        localStorage.setItem('lol_builds', JSON.stringify(local));
      }
      renderSavedBuilds();
    });

    div.addEventListener('click', e => { if (!e.target.classList.contains('sb-del')) loadBuild(b); });
    list.appendChild(div);
  });
}

function loadBuild(b) {
  const champKey = b.champ_key || b.champKey;
  if (champKey && allChampions[champKey]) {
    const champ = allChampions[champKey];
    selectedChamp = { key: champKey, champ };
    document.getElementById('champImg').src = IMG_CHAMP + champ.image.full;
    document.getElementById('champName').textContent = champ.name;
    document.getElementById('champTitle').textContent = champ.title;
    document.getElementById('champCard').classList.add('visible');
    document.getElementById('champSearch').value = champ.name;
  }
  document.getElementById('buildName').value = b.name || '';
  const ids = b.item_ids || b.itemIds || [];
  buildSlots = ids.map(id => id ? (allItems[id] || null) : null);
  while (buildSlots.length < 6) buildSlots.push(null);
  renderSlots(); updateStats();
}

document.getElementById('saveBtn').addEventListener('click', async () => {
  if (!buildSlots.some(Boolean)) { alert('Add at least one item to save a build.'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Saving…';

  try {
    const tags = [...document.getElementById('tagsWrap').querySelectorAll('.tag')].map(t => t.textContent);
    let gold = 0;
    buildSlots.forEach(item => { if (item) gold += item.gold?.total || 0; });
    const itemIds = buildSlots.map(item => item ? Object.keys(allItems).find(id => allItems[id] === item) : null);

    const build = {
      name: document.getElementById('buildName').value.trim() || 'Unnamed Build',
      champ_key: selectedChamp?.key || null,
      champ_name: selectedChamp?.champ?.name || null,
      champ_img: selectedChamp ? IMG_CHAMP + selectedChamp.champ.image.full : null,
      item_ids: itemIds,
      tags, gold,
    };

    if (currentUser) {
      const { error } = await sb.from('builds').insert({ ...build, user_id: currentUser.id });
      if (error) throw new Error(error.message);
    } else {
      const local = JSON.parse(localStorage.getItem('lol_builds')||'[]');
      local.unshift({ ...build, itemIds: itemIds, champKey: build.champ_key, champName: build.champ_name, champImg: build.champ_img, savedAt: Date.now() });
      localStorage.setItem('lol_builds', JSON.stringify(local));
    }

    await renderSavedBuilds();
    btn.textContent = '✅ Saved!';
    setTimeout(() => { btn.textContent = '💾 Save Build'; btn.disabled = false; }, 1500);
  } catch (err) {
    alert('Error saving build: ' + err.message);
    btn.textContent = '💾 Save Build';
    btn.disabled = false;
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  buildSlots = [null,null,null,null,null,null];
  selectedChamp = null;
  document.getElementById('champSearch').value = '';
  document.getElementById('champCard').classList.remove('visible');
  document.getElementById('buildName').value = '';
  renderSlots(); updateStats();
});

async function init() {
  await loadData();
  renderSlots();
  setupChampSearch();
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  await renderSavedBuilds();
}

init();
</script>
</body>
